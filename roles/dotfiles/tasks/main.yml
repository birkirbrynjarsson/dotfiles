---
- name: Ensure parent directories for dotfile targets exist
  ansible.builtin.file:
    path: "{{ item.dest | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ dotfiles_links }}"

- name: Check current state of dotfile targets
  ansible.builtin.stat:
    path: "{{ item.dest }}"
    follow: false
  register: dotfiles_target_stats
  loop: "{{ dotfiles_links }}"

- name: Back up existing non-symlink dotfiles
  ansible.builtin.command:
    argv:
      - mv
      - "{{ item.item.dest }}"
      - "{{ item.item.dest }}{{ dotfiles_backup_suffix }}"
  when:
    - dotfiles_backup_existing
    - item.stat.exists
    - not item.stat.islnk | default(false)
  loop: "{{ dotfiles_target_stats.results }}"
  changed_when: true

- name: Remove incorrect symlinks
  ansible.builtin.file:
    path: "{{ item.item.dest }}"
    state: absent
  when:
    - item.stat.islnk | default(false)
    - item.stat.lnk_source is defined
    - item.stat.lnk_source != item.item.src
  loop: "{{ dotfiles_target_stats.results }}"

- name: Create symlinks for dotfiles
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ dotfiles_links }}"

- name: Install private shell aliases, exports and functions
  ansible.builtin.copy:
    src: zsh/private.zsh.vault
    dest: "{{ ansible_facts['user_dir'] }}/.private.zsh"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: Install decrypted .shpotify.cfg in home directory
  ansible.builtin.copy:
    src: home/.shpotify.cfg.vault
    dest: "{{ ansible_facts['user_dir'] }}/.shpotify.cfg"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

# Copy vaulted SSH key
- name: Install vaulted SSH Key
  ansible.builtin.import_tasks: ssh.yml
  tags:
    - ssh
